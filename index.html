<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="오늘수거 - 쓰레기는 문 앞에, 분리수거는 오늘수거가 할게요"
    />
    <title>오늘수거 | 문 앞 분리수거 서비스</title>
    <link rel="stylesheet" href="style.css" />

    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav class="nav" role="navigation" aria-label="메인 내비게이션">
      <div class="nav__inner">
        <a href="#" class="nav__logo" aria-label="오늘수거 홈">
          <img src="images/logo.png" alt="로고" />
        </a>
        <div class="nav__links">
          <a href="#services" class="nav__link" id="nav-service-link"
            >서비스 지역</a
          >
          <a href="#app" class="nav__download-btn" id="nav-app-btn"
            >앱 다운로드</a
          >
        </div>
      </div>
    </nav>

<section class="hero-top">
  <div class="hero-top__inner">

    <div class="hero-bg">오늘수거</div>

    <h1 class="hero-title">
      쓰레기는 문 앞에,<br>
      분리수거는 <span>오늘수거</span>가 할게요
    </h1>

    <div class="hero-visual">

      <img src="images/burger.png" class="trash-item burger">
      <img src="images/box.png" class="trash-item box">
      <img src="images/container.png" class="trash-item noodle">
      <img src="images/trash.png" class="trash-item bag">
      <img src="images/bottle.png" class="trash-item bottle">
      <img src="images/cheese.png" class="trash-item cheese">

      <img src="images/trashcan.png" class="hero-bin">

    </div>
  </div>
</section>

<section class="hero-bottom">
  <div class="hero-bottom__inner">
    <h2>귀찮은 분리배출 없이 신청 한 번으로 해결하세요.</h2>

    <a href="#" class="hero-btn">
      서비스 문의하기
    </a>
  </div>
</section>

<section class="problem">
  <h2>
    쓰레기 버릴 때<br />
    이런 고민 한 적 있으시죠?
  </h2>

  <div class="problem-wave">
    <div class="problem-grid">

      <div class="problem-box">
        <img src="images/confuse.png" alt="">
        <p>정해져있는 요일</p>
      </div>

      <div class="problem-box">
        <img src="images/resi_bin.png" alt="">
        <p>애매한 배출규정</p>
      </div>

      <div class="problem-box">
        <img src="images/wondering.png" alt="">
        <p>귀찮고 번거리는<br>분리배출</p>
      </div>

    </div>
  </div>
</section>

<section class="items">
  <div class="container">

    <h2 class="items-title">
      이런것도 <span>다</span> 버릴 수 있어요!
      <img src="images/exclamation.png" alt="">
    </h2>

    <div class="items-grid">

      <div class="item-card">
        <img src="images/clothes.png" alt="">
        <p>헌옷, 이불 등 침구류</p>
      </div>

      <div class="item-card">
        <img src="images/spoon.png" alt="">
        <p>주방용품, 생활용품</p>
      </div>

      <div class="item-card">
        <img src="images/cosmatic.png" alt="">
        <p>내용물이 남은 샴푸,<br>화장품류</p>
      </div>

      <div class="item-card">
        <img src="images/leftover.png" alt="">
        <p>잔반이 남은 음식물,<br>배달쓰레기</p>
      </div>

      <div class="item-card">
        <img src="images/bottles.png" alt="">
        <p>플라스틱, 비닐 등의<br>재활용품</p>
      </div>

      <div class="item-card">
        <img src="images/books.png" alt="">
        <p>책, 종이박스 등<br>종이류</p>
      </div>

    </div>

  </div>
</section>


    <script src="main.js"></script>
  </body>
</html>
